dataset:
  name: "ROAD-CAN"
  archive_path: "Dataset"
  data_dir: "Dataset"
  img_size: 9            # Input dimension (ID, DATA0...DATA7)
  batch_size: 64
  num_workers: 4

federated:
  concept: "concept_1"   # The partitioned parquet to load (e.g., concept_1, concept_2, concept_3)
  num_clients: 10        # Note: This is overridden automatically by the concept file!
  fraction_fit: 1.0      # fraction of clients to sample per round
  num_rounds: 5
  local_epochs: 3
  partition: "iid"       # "iid" or "noniid"
  dirichlet_alpha: 0.5

pruning:
  sparsity: 0.5          # 0.0 to 1.0

training:
  model_name: "mlp"
  learning_rate: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  device: "cuda"

seed: 42
